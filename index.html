<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SPIKE Prime IDE</title>
  <!-- Load high-availability scripts natively whitelisted by browser security filters -->
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>
  <script src="https://cloudflare.com"></script>
  <style>
    /* Stop the view frame container from collapsing to 0px tall */
    html, body { 
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      font-family: sans-serif; 
    }
    #blocklyDiv { 
      width: 100vw; 
      height: 100vh; 
    }
  </style>
</head>
<body>
  <div id="blocklyDiv"></div>

  <!-- The 9 Official LEGO SPIKE Prime Toolbar Categories -->
  <xml id="toolbox" style="display: none">
    <category name="⚙️ Motors" colour="#009688">
      <block type="m_run"></block>
      <block type="m_stop"></block>
    </category>
    <category name="🚗 Movement" colour="#e91e63">
      <block type="mv_pair"></block>
      <block type="mv_dist"></block>
    </category>
    <category name="💡 Light Matrix" colour="#9c27b0">
      <block type="l_show"></block>
    </category>
    <category name="🎵 Audio Sound" colour="#00bcd4">
      <block type="s_beep"></block>
    </category>
    <category name="⏱️ Loops & Control" colour="#ff9800">
      <block type="controls_if"></block>
      <block type="controls_repeat_ext"></block>
    </category>
    <category name="🧭 Smart Sensors" colour="#4caf50">
      <block type="s_color"></block>
    </category>
    <category name="🧮 Math Operators" colour="#8bc34a">
      <block type="logic_compare"></block>
      <block type="math_arithmetic"></block>
    </category>
    <category name="📦 Data Variables" colour="#ff5722" custom="VARIABLE"></category>
    <category name="🛠️ Custom My Blocks" colour="#ff4081" custom="PROCEDURE"></category>
  </xml>

  <script>
    function initWorkspace() {
      if (typeof Blockly === 'undefined') {
        setTimeout(initWorkspace, 200);
        return;
      }

      // Replicate the word blocks to look exactly like LEGO SPIKE software properties
      Blockly.Blocks['m_run'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("motor")
              .appendField(new Blockly.FieldDropdown([["A","A"], ["B","B"], ["C","C"], ["D","D"]]), "PORT")
              .appendField("run")
              .appendField(new Blockly.FieldDropdown([["↻","CW"], ["↺","CCW"]]), "DIR")
              .appendField("for")
              .appendField(new Blockly.FieldNumber(1), "ROT")
              .appendField("rotations");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#009688');
        }
      };

      Blockly.Blocks['m_stop'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("stop motor")
              .appendField(new Blockly.FieldDropdown([["A","A"], ["B","B"], ["C","C"], ["D","D"]]), "PORT");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#009688');
        }
      };

      Blockly.Blocks['mv_pair'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("pair motors")
              .appendField(new Blockly.FieldDropdown([["A+B","AB"], ["C+D","CD"]]), "PAIR");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#e91e63');
        }
      };

      Blockly.Blocks['mv_dist'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("move pair")
              .appendField(new Blockly.FieldDropdown([["forward","F"], ["backward","B"]]), "DIR")
              .appendField("for")
              .appendField(new Blockly.FieldNumber(10), "DIST")
              .appendField("cm");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#e91e63');
        }
      };

      Blockly.Blocks['l_show'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("display matrix pattern")
              .appendField(new Blockly.FieldDropdown([["☺ Smile","S"], ["♥ Heart","H"], ["☹ Sad","Sad"]]), "PATTERN");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#9c27b0');
        }
      };

      Blockly.Blocks['s_beep'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("play beep note")
              .appendField(new Blockly.FieldNumber(60), "NOTE")
              .appendField("for")
              .appendField(new Blockly.FieldNumber(0.2), "SECS")
              .appendField("s");
          this.setPreviousStatement(true);
          this.setNextStatement(true);
          this.setColour('#00bcd4');
        }
      };

      Blockly.Blocks['s_color'] = {
        init: function() {
          this.appendDummyInput()
              .appendField("color sensor detects")
              .appendField(new Blockly.FieldDropdown([["Red","R"], ["Blue","B"], ["Green","G"]]), "COLOR");
          this.setOutput(true, "Boolean");
          this.setColour('#4caf50');
        }
      };

      // Initialize the workspace graphics canvas
      var workspace = Blockly.inject('blocklyDiv', {
        toolbox: document.getElementById('toolbox'),
        scrollbars: true,
        trashcan: true,
        grid: { spacing: 20, length: 3, colour: '#ccc', snap: true },
        zoom: { controls: true, wheel: true, startScale: 1.0, maxScale: 3, minScale: 0.3, scaleSpeed: 1.2 }
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initWorkspace);
    } else {
      initWorkspace();
    }
  </script>
</body>
</html>
